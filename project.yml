name: GreatsOfBharatha
options:
  bundleIdPrefix: com.ganesh47
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_NAME: Greats Of Bharatha
    DEVELOPMENT_TEAM: "J3387FUR8X"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0-dev
    GENERATE_INFOPLIST_FILE: YES
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
packages: {}
targets:
  GreatsOfBharatha:
    type: application
    platform: iOS
    sources:
      - path: GreatsOfBharatha
        excludes:
          - Features/Lesson/ShivajiLessonViews.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ganesh47.greatsofbharatha
        PRODUCT_NAME: Greats Of Bharatha
        INFOPLIST_KEY_CFBundleDisplayName: Greats Of Bharatha
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - GreatsOfBharathaTests
  GreatsOfBharathaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GreatsOfBharathaTests
    dependencies:
      - target: GreatsOfBharatha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ganesh47.greatsofbharatha.tests
        PRODUCT_NAME: GreatsOfBharathaTests
        PRODUCT_MODULE_NAME: GreatsOfBharathaTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Greats Of Bharatha.app/Greats Of Bharatha"
        BUNDLE_LOADER: "$(TEST_HOST)"
