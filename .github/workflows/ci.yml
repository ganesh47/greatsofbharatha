name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test iOS app slice
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve dependencies
        run: xcodebuild -project GreatsOfBharatha.xcodeproj -resolvePackageDependencies -scheme GreatsOfBharatha

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        shell: bash
        run: |
          DESTINATIONS=$(xcodebuild -showdestinations -project GreatsOfBharatha.xcodeproj -scheme GreatsOfBharatha 2>/dev/null)
          echo "$DESTINATIONS"
          DESTINATION=$(printf '%s\n' "$DESTINATIONS" | grep 'platform:iOS Simulator' | grep 'OS:' | grep 'name:iPhone' | grep -v 'id:dvtdevice-' | head -n 1 | sed -E 's/^.*\{ (.*) \}.*$/\1/' | sed 's/, /,/g' | sed 's/platform:/platform=/; s/id:/id=/; s/OS:/OS=/; s/name:/name=/')
          test -n "${DESTINATION}"
          echo "Using test destination: ${DESTINATION}"
          xcodebuild test \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination "${DESTINATION}" \
            CODE_SIGNING_ALLOWED=NO
