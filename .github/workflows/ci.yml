name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test iOS app slice
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve dependencies
        run: xcodebuild -project GreatsOfBharatha.xcodeproj -resolvePackageDependencies -scheme GreatsOfBharatha

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        shell: bash
        run: |
          DESTINATION=$(python3 -c 'import subprocess, sys; r = subprocess.run(["xcodebuild", "-showdestinations", "-project", "GreatsOfBharatha.xcodeproj", "-scheme", "GreatsOfBharatha"], capture_output=True, text=True, check=False); lines = [ln.strip() for ln in r.stdout.splitlines() if "platform:iOS Simulator" in ln and "name:" in ln and "error:" not in ln];
for line in lines:
    start = line.find("{ "); end = line.rfind(" }");
    if start != -1 and end != -1:
        print(line[start + 2:end]); sys.exit(0)
raise SystemExit("No concrete iOS Simulator destination found")')
          echo "Using test destination: ${DESTINATION}"
          xcodebuild test \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination "${DESTINATION}" \
            CODE_SIGNING_ALLOWED=NO
