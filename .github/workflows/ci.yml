name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Fast default CI only. UX screenshot capture runs separately in ios-ui-review-main.yml on push to main.

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test iOS app slice
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve dependencies
        run: xcodebuild -project GreatsOfBharatha.xcodeproj -resolvePackageDependencies -scheme GreatsOfBharatha

      - name: Choose simulator destination
        shell: bash
        run: |
          set -euo pipefail
          for name in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15"; do
            line="$(xcrun simctl list devices available | grep -F "$name (" | grep -v "26\." | head -n 1 || true)"
            if [[ -n "$line" ]]; then
              id="$(sed -E "s/.*\(([A-F0-9-]+)\).*/\1/" <<<"$line")"
              echo "SIM_DESTINATION=id=$id" >> "$GITHUB_ENV"
              echo "Using simulator: $name ($id)"
              exit 0
            fi
          done
          for name in "iPhone 16 Pro" "iPhone 16" "iPhone 15" "iPhone 17"; do
            line="$(xcrun simctl list devices available | grep -F "$name (" | head -n 1 || true)"
            if [[ -n "$line" ]]; then
              id="$(sed -E "s/.*\(([A-F0-9-]+)\).*/\1/" <<<"$line")"
              echo "SIM_DESTINATION=id=$id" >> "$GITHUB_ENV"
              echo "Using simulator (fallback): $name ($id)"
              exit 0
            fi
          done
          echo "No preferred iPhone simulator found" >&2
          xcrun simctl list devices available
          exit 1

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          SIM_ID="${SIM_DESTINATION#id=}"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          for i in $(seq 1 40); do
            STATE=$(xcrun simctl list devices | grep -F "$SIM_ID" | grep -oE 'Booted|Shutdown|Booting' | head -1 || echo "Unknown")
            echo "[$i/40] $STATE"
            if [[ "$STATE" == "Booted" ]]; then
              echo "Simulator booted: $SIM_ID"
              sleep 10
              exit 0
            fi
            sleep 5
          done
          echo "Simulator did not reach Booted state after 200s" >&2
          xcrun simctl list devices | grep -F "$SIM_ID" >&2
          exit 1

      - name: Run unit tests
        timeout-minutes: 20
        run: |
          xcodebuild test-without-building \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination "$SIM_DESTINATION" \
            -only-testing GreatsOfBharathaTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload unit test result bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-test-results-${{ github.run_number }}
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 30
