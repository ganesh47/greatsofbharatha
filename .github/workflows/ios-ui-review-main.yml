name: iOS UI Review (main)

on:
  push:
    branches: [main]

# Post-merge UX artifact workflow only. Keeps screenshot/video capture off the pull_request critical path.

permissions:
  contents: read

jobs:
  ux-review:
    name: UX review artifact capture
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Resolve dependencies
        run: xcodebuild -project GreatsOfBharatha.xcodeproj -resolvePackageDependencies -scheme GreatsOfBharatha

      - name: Choose simulator destination
        shell: bash
        run: |
          set -euo pipefail
          for name in "iPhone 16 Pro" "iPhone 16" "iPhone 15 Pro" "iPhone 15"; do
            line="$(xcrun simctl list devices available | grep -F "$name (" | grep -v "26\." | head -n 1 || true)"
            if [[ -n "$line" ]]; then
              id="$(sed -E "s/.*\(([A-F0-9-]+)\).*/\1/" <<<"$line")"
              echo "SIM_DESTINATION=id=$id" >> "$GITHUB_ENV"
              echo "Using simulator: $name ($id)"
              exit 0
            fi
          done
          for name in "iPhone 16 Pro" "iPhone 16" "iPhone 15" "iPhone 17"; do
            line="$(xcrun simctl list devices available | grep -F "$name (" | head -n 1 || true)"
            if [[ -n "$line" ]]; then
              id="$(sed -E "s/.*\(([A-F0-9-]+)\).*/\1/" <<<"$line")"
              echo "SIM_DESTINATION=id=$id" >> "$GITHUB_ENV"
              echo "Using simulator (fallback): $name ($id)"
              exit 0
            fi
          done
          echo "No preferred iPhone simulator found" >&2
          xcrun simctl list devices available
          exit 1

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project GreatsOfBharatha.xcodeproj \
            -scheme GreatsOfBharatha \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          SIM_ID="${SIM_DESTINATION#id=}"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          for i in $(seq 1 40); do
            STATE=$(xcrun simctl list devices | grep -F "$SIM_ID" | grep -oE 'Booted|Shutdown|Booting' | head -1 || echo "Unknown")
            echo "[$i/40] $STATE"
            if [[ "$STATE" == "Booted" ]]; then
              echo "Simulator booted: $SIM_ID"
              sleep 10
              exit 0
            fi
            sleep 5
          done
          echo "Simulator did not reach Booted state after 200s" >&2
          xcrun simctl list devices | grep -F "$SIM_ID" >&2
          exit 1

      - name: Run routed capture lane
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci_artifacts
          SIM_ID="${SIM_DESTINATION#id=}"
          BUNDLE_ID="com.ganesh47.greatsofbharatha"
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*Build/Products/Debug-iphonesimulator/Greats Of Bharatha.app" | head -n 1 || true)
          if [[ -z "$APP_PATH" ]]; then
            echo "App bundle not found for simulator artifact capture" >&2
            exit 0
          fi

          open -a Simulator || true
          xcrun simctl bootstatus "$SIM_ID" -b || true

          capture_route() {
            local name="$1"
            local route="$2"

            xcrun simctl terminate "$SIM_ID" "$BUNDLE_ID" || true
            xcrun simctl uninstall "$SIM_ID" "$BUNDLE_ID" >/dev/null 2>&1 || true
            xcrun simctl install "$SIM_ID" "$APP_PATH"
            SIMCTL_CHILD_GOB_CAPTURE_ROUTE="$route" xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" || true
            sleep 6
            xcrun simctl io "$SIM_ID" screenshot "ci_artifacts/${name}.png" || true
          }

          capture_route "01-learn-home" "learn-home"
          capture_route "02-scene-1" "scene-1"
          capture_route "03-scene-2" "scene-2"
          capture_route "04-places-hub" "places-hub"
          capture_route "05-place-shivneri" "place-shivneri"
          capture_route "06-chronicle-unlocked" "chronicle-unlocked"

          xcrun simctl terminate "$SIM_ID" "$BUNDLE_ID" || true
          xcrun simctl uninstall "$SIM_ID" "$BUNDLE_ID" >/dev/null 2>&1 || true
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          SIMCTL_CHILD_GOB_CAPTURE_ROUTE="place-shivneri" xcrun simctl launch "$SIM_ID" "$BUNDLE_ID" || true
          sleep 4
          xcrun simctl io "$SIM_ID" recordVideo --codec=h264 "ci_artifacts/ux-preview.mov" &
          VIDEO_PID=$!
          sleep 10
          kill -INT "$VIDEO_PID" 2>/dev/null || true
          wait "$VIDEO_PID" 2>/dev/null || true

      - name: Upload UI review result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-review-results-${{ github.run_number }}
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload simulator UX artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-review-artifacts-${{ github.run_number }}-${{ github.run_attempt }}
          path: ci_artifacts
          if-no-files-found: ignore
          retention-days: 30
