name: TestFlight Crash Feedback Sync

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: testflight-crash-feedback-sync
  cancel-in-progress: false

jobs:
  sync-crash-feedback:
    name: Create issues for new TestFlight crash feedback
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Python dependencies
        run: python3 -m pip install --disable-pip-version-check -r ci_scripts/requirements-ci.txt

      - name: Sync TestFlight crash feedback into GitHub issues
        env:
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TESTFLIGHT_FEEDBACK_ONLY_KIND: crash
        run: python3 ci_scripts/testflight_feedback_to_issues.py
