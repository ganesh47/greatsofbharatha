name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Greats Of Bharatha ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-version:refname | sed -n '2p')" \
            --notes "$(cat <<'TXT'
          ## Greats Of Bharatha ${{ steps.version.outputs.tag }}

          TestFlight distribution is expected to flow through Xcode Cloud once the project is wired there.
          This release tracks the alpha slice centered on Shivaji Maharaj.
          TXT
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
