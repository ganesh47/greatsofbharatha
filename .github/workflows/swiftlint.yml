name: SwiftLint

on:
  push:
    branches: [main]
    paths:
      - "**/*.swift"
      - ".swiftlint.yml"
      - ".github/workflows/swiftlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.swift"
      - ".swiftlint.yml"
      - ".github/workflows/swiftlint.yml"

permissions:
  contents: read

concurrency:
  group: swiftlint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: Swift quality gate
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint
