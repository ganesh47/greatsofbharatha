name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '22 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@da8674e05c1e502a3dfeaecadfb7b8de2a24b6ff
        with:
          languages: swift

      - name: Autobuild
        uses: github/codeql-action/autobuild@da8674e05c1e502a3dfeaecadfb7b8de2a24b6ff

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@da8674e05c1e502a3dfeaecadfb7b8de2a24b6ff
